[package]
name = "komodo-secure"
version = "0.6.0"
edition = "2024"

[dependencies]
eframe = "0.31.0"
sysinfo = "0.33.1"
clap = "4.6.0"
regex = "1"
walkdir = "2"
io = "0.0.2"
colored = "3.1.1"
inquire = "0.9.4"
anyhow = "1.0"  
rustyline = "17.0.2"
home = "0.5.12"
notify = "8.2.0"
aes-gcm = "0.10"
rand = "0.8.0"
aead = "0.5"
argon2 = "0.5"
pbkdf2 = "0.12"
hmac = "0.12"
sha2 = "0.10"
chrono = "0.4"

[target.'cfg(windows)'.dependencies]
windows-sys = { version = "0.52", features = ["Win32_Storage_FileSystem", "Win32_Security", "Win32_Foundation"] }
